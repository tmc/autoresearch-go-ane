<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" font-family="'SF Pro Display', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="barSmall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="barBig" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="barRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="30%" stop-color="#fbbf24" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="500" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="858" height="498" rx="15" fill="none" stroke="#1e293b" stroke-width="1"/>

  <!-- Title area -->
  <text x="430" y="40" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700" letter-spacing="-0.5">Inference Speed Optimization</text>
  <text x="430" y="62" text-anchor="middle" fill="#64748b" font-size="13" letter-spacing="0.3">Autonomous Claude Code agent on Apple M5 Max  &#x2022;  110M Llama2 on ANE  &#x2022;  256 tokens</text>

  <!-- Badge -->
  <rect x="350" y="72" width="160" height="24" rx="12" fill="#059669" opacity="0.15"/>
  <rect x="350" y="72" width="160" height="24" rx="12" fill="none" stroke="#10b981" stroke-width="1" opacity="0.4"/>
  <text x="430" y="88" text-anchor="middle" fill="#34d399" font-size="12" font-weight="600">977x faster</text>

  <!-- Chart area -->
  <g transform="translate(85, 110)">
    <!-- Y-axis -->
    <text x="-12" y="-5" text-anchor="end" fill="#475569" font-size="10">tok/s</text>

    <!-- Grid lines with labels -->
    <line x1="0" y1="0" x2="710" y2="0" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3,4"/>
    <text x="-10" y="4" text-anchor="end" fill="#475569" font-size="10">12k</text>

    <line x1="0" y1="70" x2="710" y2="70" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3,4"/>
    <text x="-10" y="74" text-anchor="end" fill="#475569" font-size="10">9k</text>

    <line x1="0" y1="140" x2="710" y2="140" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3,4"/>
    <text x="-10" y="144" text-anchor="end" fill="#475569" font-size="10">6k</text>

    <line x1="0" y1="210" x2="710" y2="210" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3,4"/>
    <text x="-10" y="214" text-anchor="end" fill="#475569" font-size="10">3k</text>

    <!-- Baseline axis -->
    <line x1="0" y1="280" x2="710" y2="280" stroke="#334155" stroke-width="1"/>
    <text x="-10" y="284" text-anchor="end" fill="#475569" font-size="10">0</text>

    <!-- Bar width: 80, gap: 20, total per bar: 100 -->

    <!-- Bar 0: Baseline 12 tok/s -->
    <rect x="10" y="279.7" width="80" height="0.3" rx="1" fill="url(#barRed)"/>
    <circle cx="50" cy="279" r="3" fill="#ef4444" filter="url(#glow)"/>
    <text x="50" y="268" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">12</text>
    <text x="50" y="300" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="500">Baseline</text>
    <text x="50" y="314" text-anchor="middle" fill="#ef4444" font-size="9" opacity="0.8">21.5 sec</text>

    <!-- Bar 1: BLAS 366 tok/s -->
    <rect x="110" y="271.5" width="80" height="8.5" rx="3" fill="url(#barSmall)"/>
    <text x="150" y="264" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">366</text>
    <text x="150" y="300" text-anchor="middle" fill="#cbd5e1" font-size="10">+BLAS</text>
    <text x="150" y="314" text-anchor="middle" fill="#64748b" font-size="9">30x</text>

    <!-- Bar 2: CPU cls 416 tok/s -->
    <rect x="210" y="270.3" width="80" height="9.7" rx="3" fill="url(#barSmall)"/>
    <text x="250" y="263" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">416</text>
    <text x="250" y="300" text-anchor="middle" fill="#cbd5e1" font-size="10">+CPU cls</text>
    <text x="250" y="314" text-anchor="middle" fill="#64748b" font-size="9">35x</text>

    <!-- Bar 3: RMS fix 423 tok/s -->
    <rect x="310" y="270.1" width="80" height="9.9" rx="3" fill="url(#barSmall)"/>
    <text x="350" y="263" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">423</text>
    <text x="350" y="300" text-anchor="middle" fill="#cbd5e1" font-size="10">+RMS fix</text>
    <text x="350" y="314" text-anchor="middle" fill="#64748b" font-size="9">35x</text>

    <!-- Callout: the big jump -->
    <line x1="395" y1="200" x2="395" y2="40" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
    <rect x="345" y="170" width="100" height="42" rx="8" fill="#fbbf24" opacity="0.1"/>
    <rect x="345" y="170" width="100" height="42" rx="8" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>
    <text x="395" y="188" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700" filter="url(#glow)">ANE was</text>
    <text x="395" y="203" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700" filter="url(#glow)">silently broken!</text>

    <!-- Bar 4: ANE FIXED 10,667 tok/s -->
    <rect x="410" y="31" width="80" height="249" rx="4" fill="url(#barBig)" filter="url(#softGlow)"/>
    <text x="450" y="23" text-anchor="middle" fill="#6ee7b7" font-size="15" font-weight="800">10,667</text>
    <text x="450" y="300" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">ANE fixed!</text>
    <text x="450" y="314" text-anchor="middle" fill="#34d399" font-size="9" font-weight="700">889x</text>

    <!-- Bar 5: vDSP 11,178 tok/s -->
    <rect x="510" y="19" width="80" height="261" rx="4" fill="url(#barBig)"/>
    <text x="550" y="12" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="700">11,178</text>
    <text x="550" y="300" text-anchor="middle" fill="#cbd5e1" font-size="10">+vDSP</text>
    <text x="550" y="314" text-anchor="middle" fill="#64748b" font-size="9">932x</text>

    <!-- Bar 6: Pre-scale 11,289 tok/s -->
    <rect x="610" y="16.5" width="80" height="263.5" rx="4" fill="url(#barBig)"/>
    <text x="650" y="10" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="700">11,289</text>
    <text x="650" y="300" text-anchor="middle" fill="#cbd5e1" font-size="10">+pre-scale</text>
    <text x="650" y="314" text-anchor="middle" fill="#64748b" font-size="9">941x</text>

    <!-- Trend line connecting tops -->
    <polyline points="50,279 150,271.5 250,270.3 350,270.1 450,31 550,19 650,16.5"
              fill="none" stroke="url(#glowLine)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <!-- Dots on trend line -->
    <circle cx="450" cy="31" r="4" fill="#fbbf24" opacity="0.8" filter="url(#glow)"/>
    <circle cx="650" cy="16.5" r="4" fill="#34d399" opacity="0.8" filter="url(#glow)"/>
  </g>

  <!-- Footer -->
  <rect x="30" y="455" width="800" height="30" rx="8" fill="#1e293b" opacity="0.4"/>
  <text x="430" y="475" text-anchor="middle" fill="#64748b" font-size="11">All optimizations discovered and implemented autonomously by Claude Code  &#x2022;  BenchmarkEvalLogits  &#x2022;  go test -bench</text>
</svg>
